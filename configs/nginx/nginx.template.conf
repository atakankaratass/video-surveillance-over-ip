worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  types {
    application/dash+xml mpd;
    video/iso.segment m4s;
  }

  server {
    listen {{PORT}};
    server_name {{HOST}};
    root {{PROJECT_ROOT}};

    location /dash/ {
      alias {{DASH_ROOT}}/;
      add_header Cache-Control no-cache;
    }

    location / {
      try_files $uri /index.html;
    }
  }
}
